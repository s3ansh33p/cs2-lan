{{define "scoreboard.html"}}
{{if .Scoreboard}}
<table class="w-full text-sm">
    <thead>
        <tr class="border-b border-slate-700 text-slate-400 text-left">
            <th class="px-4 py-2 font-medium">Player</th>
            <th class="px-4 py-2 font-medium text-center">K</th>
            <th class="px-4 py-2 font-medium text-center">D</th>
            <th class="px-4 py-2 font-medium text-center">A</th>
            <th class="px-4 py-2 font-medium text-center">K/D</th>
        </tr>
    </thead>
    <tbody>
        {{range .Scoreboard}}
        <tr class="border-b border-slate-700/50">
            <td class="px-4 py-2 text-white">{{.Name}}</td>
            <td class="px-4 py-2 text-green-400 text-center">{{.Kills}}</td>
            <td class="px-4 py-2 text-red-400 text-center">{{.Deaths}}</td>
            <td class="px-4 py-2 text-yellow-400 text-center">{{.Assists}}</td>
            <td class="px-4 py-2 text-slate-300 text-center">
                {{if eq .Deaths 0}}-{{else}}{{printf "%.1f" (divf .Kills .Deaths)}}{{end}}
            </td>
        </tr>
        {{end}}
    </tbody>
</table>
{{else}}
<div class="px-4 py-8 text-center text-slate-500 text-sm">
    No kills recorded yet
</div>
{{end}}
{{end}}
