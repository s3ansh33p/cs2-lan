{{define "announce"}}
<div id="announce-banner" class="hidden bg-orange-600 text-white text-center py-2 text-sm font-bold"></div>
<script>
(function() {
    var banner = document.getElementById('announce-banner');
    if (!banner) return;
    var MSG_KEY = 'announce_msg';
    var LINK_KEY = 'announce_link';
    function show(msg, link) {
        if (msg) {
            banner.innerHTML = '';
            var text = document.createTextNode(msg);
            if (link) {
                var a = document.createElement('a');
                a.href = link;
                a.className = 'underline hover:text-orange-200';
                if (link.indexOf('http://') === 0 || link.indexOf('https://') === 0) {
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                }
                a.appendChild(text);
                banner.appendChild(a);
            } else {
                banner.appendChild(text);
            }
            banner.classList.remove('hidden');
        } else {
            banner.classList.add('hidden');
            banner.innerHTML = '';
        }
    }
    var cached = localStorage.getItem(MSG_KEY);
    if (cached) show(cached, localStorage.getItem(LINK_KEY));
    Page.on('announce', function(d) {
        if (d.message) localStorage.setItem(MSG_KEY, d.message);
        else localStorage.removeItem(MSG_KEY);
        if (d.link) localStorage.setItem(LINK_KEY, d.link);
        else localStorage.removeItem(LINK_KEY);
        show(d.message, d.link);
    });
})();
</script>
{{end}}
