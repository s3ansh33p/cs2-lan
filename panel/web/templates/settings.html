{{define "content"}}
<div class="mb-6">
    <h1 class="text-2xl font-bold mb-1">Settings</h1>
    <p class="text-slate-400 text-sm">Configure site-wide settings.</p>
</div>

<div class="max-w-lg space-y-6">
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-6">
        <h2 class="text-lg font-semibold mb-4">General</h2>
        <form method="POST" action="/admin/settings/site-name" class="space-y-4">
            <div>
                <label class="block text-sm text-slate-400 mb-1">Site Name</label>
                <input type="text" name="site_name" value="{{.SiteName}}" required
                    class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-orange-500">
                <p class="text-xs text-slate-500 mt-1">Displayed in the nav bar and public pages.</p>
            </div>
            <button type="submit" class="bg-orange-600 hover:bg-orange-700 text-white font-medium rounded px-4 py-2 text-sm">
                Save
            </button>
        </form>
    </div>

    <div class="bg-slate-800 border border-slate-700 rounded-lg p-6">
        <h2 class="text-lg font-semibold mb-4">Event Schedule Bounds</h2>
        <p class="text-xs text-slate-500 mb-3">Define the event time range. The schedule calendar grid spans this range.</p>
        <form method="POST" action="/admin/settings/event-bounds" class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Event Start</label>
                    <input type="datetime-local" name="event_start" value="{{.EventStart}}"
                        class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-orange-500">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Event End</label>
                    <input type="datetime-local" name="event_end" value="{{.EventEnd}}"
                        class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-orange-500">
                </div>
            </div>
            <button type="submit" class="bg-orange-600 hover:bg-orange-700 text-white font-medium rounded px-4 py-2 text-sm">
                Save
            </button>
        </form>
    </div>

    <div class="bg-slate-800 border border-slate-700 rounded-lg p-6">
        <h2 class="text-lg font-semibold mb-4">Announcement</h2>
        <p class="text-xs text-slate-500 mb-3">Broadcast a message to all connected public and admin clients.</p>
        <form method="POST" action="/admin/announcement" class="space-y-3">
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" name="message" placeholder="Type an announcement..." value="{{.Announcement}}"
                    class="flex-1 bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-orange-500">
                <div class="flex gap-2">
                    <button type="submit" class="flex-1 sm:flex-none bg-orange-600 hover:bg-orange-700 text-white font-medium rounded px-4 py-2 text-sm">Send</button>
                    <button type="button" onclick="fetch('/admin/announcement',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded','X-Requested-With':'XMLHttpRequest'},body:'message=&link='});this.closest('form').querySelector('[name=message]').value='';this.closest('form').querySelector('[name=link]').value=''" class="flex-1 sm:flex-none bg-slate-600 hover:bg-slate-500 text-white font-medium rounded px-4 py-2 text-sm">Clear</button>
                </div>
            </div>
            <div>
                <label class="block text-xs text-slate-500 mb-1">Link (optional)</label>
                <input type="text" name="link" placeholder="/tournament/5 or https://..." value="{{.AnnouncementLink}}"
                    class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-orange-500">
            </div>
        </form>
    </div>
</div>
{{end}}
