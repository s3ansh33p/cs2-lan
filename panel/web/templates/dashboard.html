{{define "content"}}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Servers</h1>
    <a href="/launch" class="bg-orange-500 hover:bg-orange-600 text-white font-medium rounded px-4 py-2 text-sm transition-colors">
        Launch Server
    </a>
</div>

<div class="bg-slate-800 border border-slate-700 rounded-lg overflow-hidden">
    <table class="w-full text-sm">
        <thead class="bg-slate-750">
            <tr class="border-b border-slate-700 text-slate-400 text-left">
                <th class="px-4 py-3 font-medium">Name</th>
                <th class="px-4 py-3 font-medium">Status</th>
                <th class="px-4 py-3 font-medium">Port</th>
                <th class="px-4 py-3 font-medium">Mode</th>
                <th class="px-4 py-3 font-medium">Map</th>
                <th class="px-4 py-3 font-medium">Players</th>
                <th class="px-4 py-3 font-medium text-right">Actions</th>
            </tr>
        </thead>
        <tbody id="server-table" hx-get="/api/servers" hx-trigger="every 10s" hx-swap="innerHTML">
            {{template "server_rows.html" .}}
        </tbody>
    </table>
    {{if not .Servers}}
    <div class="px-4 py-12 text-center text-slate-500">
        No servers running. <a href="/launch" class="text-orange-400 hover:underline">Launch one</a>.
    </div>
    {{end}}
</div>
{{end}}
