{{define "content"}}
<div class="mb-6">
    <h1 class="text-2xl font-bold">Launch Server</h1>
</div>

{{if .Error}}
<div class="bg-red-900/50 border border-red-700 text-red-300 rounded px-4 py-3 mb-6 text-sm">
    {{.Error}}
</div>
{{end}}

<form method="POST" action="/admin/launch" class="bg-slate-800 border border-slate-700 rounded-lg p-6 max-w-2xl">
    <input type="hidden" name="match_id" id="launch-match-id">
    <input type="hidden" name="game_number" id="launch-game-number">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm text-slate-400 mb-1">Server Name</label>
            <input type="text" name="name" required placeholder="e.g. comp" value="{{if .Form}}{{.Form.Name}}{{end}}"
                class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-orange-400 text-sm">
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Port</label>
            <input type="number" name="port" required placeholder="27015" value="{{if .Form}}{{.Form.Port}}{{else}}{{.NextPort}}{{end}}"
                class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-orange-400 text-sm">
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Game Mode</label>
            <select name="mode" id="launch-mode" onchange="updateMapOptions()"
                class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-orange-400 text-sm">
                <option value="competitive" {{if and .Form (eq .Form.Mode "competitive")}}selected{{end}}>Competitive</option>
                <option value="casual" {{if and .Form (eq .Form.Mode "casual")}}selected{{end}}>Casual</option>
                <option value="deathmatch" {{if and .Form (eq .Form.Mode "deathmatch")}}selected{{end}}>Deathmatch</option>
                <option value="armsrace" {{if and .Form (eq .Form.Mode "armsrace")}}selected{{end}}>Arms Race</option>
                <option value="demolition" {{if and .Form (eq .Form.Mode "demolition")}}selected{{end}}>Demolition</option>
                <option value="wingman" {{if and .Form (eq .Form.Mode "wingman")}}selected{{end}}>Wingman</option>
            </select>
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Starting Map</label>
            <select name="map" id="launch-map"
                class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-orange-400 text-sm">
            </select>
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Max Players</label>
            <input type="number" name="players" placeholder="10" value="{{if .Form}}{{.Form.Players}}{{end}}"
                class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-orange-400 text-sm">
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Server Password (optional)</label>
            <input type="text" name="password" placeholder="Leave empty for no password" value="{{if .Form}}{{.Form.Password}}{{end}}"
                class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-orange-400 text-sm">
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">RCON Password <span class="text-slate-500">(auto-generated if empty)</span></label>
            <input type="text" name="rcon" placeholder="Leave empty for random" value="{{if .Form}}{{.Form.RCON}}{{end}}"
                class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-orange-400 text-sm">
        </div>
        <div class="flex items-end">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="tv" {{if and .Form .Form.TV}}checked{{end}}
                    class="w-4 h-4 rounded bg-slate-700 border-slate-600 text-orange-500 focus:ring-orange-400">
                <span class="text-sm text-slate-300">Enable CSTV</span>
            </label>
        </div>
    </div>

    <div class="mt-4">
        <label class="block text-sm text-slate-400 mb-1">Extra Config <span class="text-slate-500">(optional, one cvar per line)</span></label>
        <textarea name="extra_cfg" rows="3" placeholder="e.g. mp_freezetime 10&#10;sv_alltalk 1"
            class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-orange-400 text-sm font-mono">{{if .Form}}{{.Form.ExtraCfg}}{{end}}</textarea>
    </div>

    <div class="mt-6 flex gap-3">
        <button type="submit"
            class="bg-orange-500 hover:bg-orange-600 text-white font-medium rounded px-6 py-2 text-sm transition-colors">
            Launch
        </button>
        <a href="/admin" class="bg-slate-700 hover:bg-slate-600 text-white font-medium rounded px-6 py-2 text-sm transition-colors">
            Cancel
        </a>
    </div>
</form>

<script>
function updateMapOptions() {
    var mode = document.getElementById('launch-mode').value;
    var mapSelect = document.getElementById('launch-map');
    var maps = (typeof _mapPools !== 'undefined' && _mapPools[mode]) || _allMaps || [];
    var current = mapSelect.value;
    mapSelect.innerHTML = '';
    for (var i = 0; i < maps.length; i++) {
        var opt = document.createElement('option');
        opt.value = maps[i];
        opt.textContent = maps[i];
        if (maps[i] === current) opt.selected = true;
        mapSelect.appendChild(opt);
    }
}
document.addEventListener('DOMContentLoaded', function() {
    // Pre-fill from query params (e.g. from bracket match launch)
    var params = new URLSearchParams(window.location.search);
    var fields = {name: 'name', port: 'port', mode: 'launch-mode', map: null, players: 'players', password: 'password'};
    for (var key in fields) {
        var val = params.get(key);
        if (!val) continue;
        var el = fields[key] ? document.querySelector('[name="' + key + '"]') : null;
        if (key === 'mode') el = document.getElementById('launch-mode');
        if (el) el.value = val;
    }
    updateMapOptions();
    // Set map after options are built
    var mapParam = params.get('map');
    if (mapParam) document.getElementById('launch-map').value = mapParam;
    // Pass match linkage through hidden fields
    var matchId = params.get('match_id');
    var gameNum = params.get('game_number');
    if (matchId) document.getElementById('launch-match-id').value = matchId;
    if (gameNum) document.getElementById('launch-game-number').value = gameNum;
});
</script>
{{end}}
