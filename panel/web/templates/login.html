<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CS2 Panel</title>
    <link rel="stylesheet" href="/static/tailwind.css">
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex items-center justify-center">
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-orange-400 mb-6 text-center">CS2 Panel</h1>
        {{if .Error}}
        <div class="bg-red-900/50 border border-red-700 text-red-300 rounded px-4 py-2 mb-4 text-sm">
            Invalid password
        </div>
        {{end}}
        <form method="POST" action="/login">
            <label class="block text-sm text-slate-400 mb-2">Password</label>
            <input type="password" name="password" autofocus
                class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-orange-400 mb-4">
            <button type="submit"
                class="w-full bg-orange-500 hover:bg-orange-600 text-white font-medium rounded px-4 py-2 transition-colors">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
