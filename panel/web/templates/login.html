<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Sean McGinty (s3ansh33p)">
    <title>Login - {{siteName}}</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
    <link rel="manifest" href="/static/favicon/site.webmanifest">
    <link rel="stylesheet" href="/static/tailwind.css">
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex items-center justify-center">
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-orange-400 mb-6 text-center">{{siteName}}</h1>
        {{if .Error}}
        <div class="bg-red-900/50 border border-red-700 text-red-300 rounded px-4 py-2 mb-4 text-sm">
            Invalid password
        </div>
        {{end}}
        <form method="POST" action="/login">
            <label for="password" class="block text-sm text-slate-400 mb-2">Password</label>
            <input type="password" name="password" id="password" autofocus
                class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-orange-400 mb-4">
            <button type="submit"
                class="w-full bg-orange-500 hover:bg-orange-600 text-white font-medium rounded px-4 py-2 transition-colors">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
