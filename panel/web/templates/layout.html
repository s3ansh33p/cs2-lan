{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Sean McGinty (s3ansh33p)">
    <title>{{if .Title}}{{.Title}} - {{end}}{{siteName}}</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
    <link rel="manifest" href="/static/favicon/site.webmanifest">
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/tailwind.css">
    <style>
        body { background-color: #0f172a; }
        #log-output { font-family: 'Courier New', monospace; font-size: 13px; }
        #rcon-output { font-family: 'Courier New', monospace; font-size: 13px; }
        .fade-in { animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen">
    {{block "nav" .}}
    <nav class="bg-slate-800 border-b border-slate-700">
        <div class="px-4 sm:px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4 sm:gap-6">
                <a href="/admin" class="text-lg font-bold text-orange-400 hover:text-orange-300">{{siteName}}</a>
                <div class="hidden sm:flex items-center gap-6">
                    <a href="/admin" class="text-slate-300 hover:text-white text-sm">Dashboard</a>
                    <a href="/admin/launch" class="text-slate-300 hover:text-white text-sm">Launch Server</a>
                    <a href="/admin/tournament" class="text-slate-300 hover:text-white text-sm">Tournament</a>
                    <a href="/admin/schedule" class="text-slate-300 hover:text-white text-sm">Schedule</a>
                    <a href="/admin/settings" class="text-slate-300 hover:text-white text-sm">Settings</a>
                </div>
            </div>
            <form method="POST" action="/logout" class="hidden sm:block">
                <button type="submit" class="text-slate-400 hover:text-white text-sm">Logout</button>
            </form>
            <button onclick="this.closest('nav').querySelector('#mobile-menu').classList.toggle('hidden')" class="sm:hidden text-slate-400 hover:text-white cursor-pointer" aria-label="Menu">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </div>
        <div id="mobile-menu" class="hidden sm:hidden border-t border-slate-700 px-4 py-2 space-y-1">
            <a href="/admin" class="block py-2 text-slate-300 hover:text-white text-sm">Dashboard</a>
            <a href="/admin/launch" class="block py-2 text-slate-300 hover:text-white text-sm">Launch Server</a>
            <a href="/admin/tournament" class="block py-2 text-slate-300 hover:text-white text-sm">Tournament</a>
            <a href="/admin/schedule" class="block py-2 text-slate-300 hover:text-white text-sm">Schedule</a>
            <a href="/admin/settings" class="block py-2 text-slate-300 hover:text-white text-sm">Settings</a>
            <form method="POST" action="/logout" class="pt-1 border-t border-slate-700">
                <button type="submit" class="block w-full text-left py-2 text-slate-400 hover:text-white text-sm">Logout</button>
            </form>
        </div>
    </nav>
    {{end}}
    {{template "announce" .}}

    {{block "scripts" .}}<script src="/static/bracket.js"></script><script src="/static/admin.js"></script>{{end}}

    <main class="max-w-7xl mx-auto px-4 py-6">
        {{template "content" .}}
    </main>
</body>
</html>
{{end}}
