{{define "content"}}
<div class="mb-4">
    <div class="flex items-center gap-2 mb-2">
        <a href="/" class="text-slate-400 hover:text-white text-sm">&larr; Dashboard</a>
        <span class="text-slate-600 text-sm">&middot;</span>
        <span class="text-slate-500 text-sm font-mono">:{{.Server.Port}}</span>
    </div>
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
            <h1 id="server-title" class="text-2xl font-bold">{{.Alias}}</h1>
            <button onclick="renameServer('{{.Server.Name}}')" class="text-slate-500 hover:text-white text-sm" title="Rename">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            </button>
        </div>
        <div class="flex gap-2">
            <button hx-post="/server/{{.Server.Name}}/restart" hx-confirm="Restart server {{.Server.Name}}?"
                class="bg-orange-600 hover:bg-orange-700 text-white font-medium rounded px-4 py-2 text-sm transition-colors">
                Restart
            </button>
            <button hx-post="/server/{{.Server.Name}}/stop" hx-confirm="Stop server {{.Server.Name}}?"
                class="bg-red-600 hover:bg-red-700 text-white font-medium rounded px-4 py-2 text-sm transition-colors">
                Stop Server
            </button>
        </div>
    </div>
</div>

<!-- Score Bar -->
<div id="score-bar" class="bg-slate-800 border border-slate-700 rounded-lg p-4 mb-4">
    <div class="flex items-center justify-center gap-6 text-center">
        <div>
            <div class="text-xs text-blue-400 font-medium">CT</div>
            <div id="score-ct" class="text-3xl font-bold text-blue-400">0</div>
        </div>
        <div>
            <div class="flex items-center justify-center gap-2 text-xs text-slate-500 mb-1">
                <span id="score-mode"></span>
                <span>&middot;</span>
                <span id="score-map" class="flex items-center gap-1"></span>
            </div>
            <div class="text-xs text-slate-500">Round</div>
            <div id="score-round" class="text-lg text-slate-400">0</div>
        </div>
        <div>
            <div class="text-xs text-yellow-400 font-medium">T</div>
            <div id="score-t" class="text-3xl font-bold text-yellow-400">0</div>
        </div>
    </div>
    <div id="round-history" class="hidden mt-3 flex items-center justify-center gap-1 flex-wrap px-2 pb-2"></div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- RCON Console -->
    <div class="bg-slate-800 border border-slate-700 rounded-lg flex flex-col" style="height: 500px;">
        <div class="px-4 py-3 border-b border-slate-700 text-sm font-medium text-slate-300">RCON Console</div>
        <div id="rcon-output" class="flex-1 overflow-y-auto p-4 space-y-2">
            <div class="text-slate-500 text-xs">Connected to {{.Server.Name}} on port {{.Server.Port}}</div>
        </div>
        <form id="rcon-form" hx-post="/server/{{.Server.Name}}/rcon" hx-target="#rcon-output" hx-swap="beforeend"
            class="border-t border-slate-700 p-2 flex gap-2 relative">
            <span class="text-orange-400 py-2 pl-2">&gt;</span>
            <div class="flex-1 relative">
                <input type="text" name="command" id="rcon-input" autocomplete="off" placeholder="Enter RCON command..."
                    class="w-full bg-transparent border-none text-white focus:outline-none text-sm">
                <div id="rcon-suggestions" class="hidden absolute bottom-full left-0 w-full bg-slate-700 border border-slate-600 rounded-t max-h-48 overflow-y-auto"></div>
            </div>
            <button type="submit" class="bg-slate-700 hover:bg-slate-600 text-white rounded px-3 py-1 text-sm">Send</button>
        </form>
    </div>

    <!-- Live Logs -->
    <div class="bg-slate-800 border border-slate-700 rounded-lg flex flex-col" style="height: 500px;">
        <div class="px-4 py-3 border-b border-slate-700 flex items-center justify-between">
            <span class="text-sm font-medium text-slate-300">Container Logs</span>
            <div class="flex items-center gap-2">
                <button id="log-events" onclick="toggleLogEvents()" class="text-xs bg-slate-700 hover:bg-slate-600 text-white rounded px-2 py-1">Raw</button>
                <button id="log-pause" onclick="toggleLogPause()" class="text-xs bg-slate-700 hover:bg-slate-600 text-white rounded px-2 py-1">Pause</button>
                <button onclick="clearLogs()" class="text-xs bg-slate-700 hover:bg-slate-600 text-white rounded px-2 py-1">Clear</button>
                <button id="log-reconnect" onclick="reconnectLogs()" class="hidden text-xs bg-slate-700 hover:bg-slate-600 text-white rounded px-2 py-1">Reconnect</button>
                <span id="log-status" class="text-xs text-green-400">Connecting...</span>
            </div>
        </div>
        <div id="log-output" class="flex-1 overflow-y-auto p-4 text-xs leading-relaxed text-slate-300 whitespace-pre-wrap">
        </div>
    </div>
</div>

<!-- Players -->
<div class="mt-4 bg-slate-800 border border-slate-700 rounded-lg">
    <div class="px-4 py-3 border-b border-slate-700 text-sm font-medium text-slate-300">
        Players <span id="player-count" class="text-slate-500"></span>
    </div>
    <div id="player-list">
        {{template "player_list.html" .}}
    </div>
</div>

<div class="mt-6">
    <!-- Killfeed -->
    <div class="bg-slate-800 border border-slate-700 rounded-lg" style="max-height: 400px;">
        <div class="px-4 py-3 border-b border-slate-700 text-sm font-medium text-slate-300">Killfeed</div>
        <div id="killfeed" class="overflow-y-auto" style="max-height: 350px;">
            {{template "killfeed.html" .}}
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        connectLogWS('{{.Server.Name}}');
        connectGameWS('{{.Server.Name}}');
    });
</script>
{{end}}
