// LAN default config - loaded by all servers after server.cfg
// Edit this file to change defaults for all servers

mp_overtime_enable 1
mp_autokick 0

// For more 'reliable' CSTV
// 'connect ip:port; password changeme'
sv_deltaticks_enforce 0

// 90 seconds delay
tv_delaymapchange 1
tv_delay 90
mp_endmatch_votenextmap 1
mp_endmatch_votenextleveltime 60

// auto record
tv_autorecord 1
